<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Drink at your own risk." />
    <title>CIA Energy</title>
  </head>
  <body>
    <main id="app">
      <div class="scene-bg scene-bg--current" id="scene-bg-current" aria-hidden="true"></div>
      <div class="scene-bg scene-bg--next" id="scene-bg-next" aria-hidden="true"></div>
      <canvas id="particles" aria-hidden="true"></canvas>
      <canvas id="scene" aria-label="Interactive 3D CIA Energy can render"></canvas>
      <div class="scroll-hint" id="scroll-hint" aria-hidden="true">
        <span class="scroll-hint__mouse">
          <span class="scroll-hint__wheel"></span>
        </span>
        <span class="scroll-hint__text">Scroll</span>
      </div>
      <button class="entry" id="entry" type="button" disabled>
        <span class="entry__prompt" id="status">Loading render</span>
      </button>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
